{% extends "base.html" %}

{% block title %}截图识别 - 胶卷价格追踪{% endblock %}

{% block content %}
<h1 class="mb-4">截图识别</h1>

<div class="row g-4">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">上传截图</h5>
                <p class="card-text mb-3">支持粘贴 (Ctrl+V)、拖拽或点击选择购物车/订单截图</p>

                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p>在此粘贴或拖入截图</p>
                        <small class="text-muted">Ctrl+V 粘贴 / 拖拽文件 / 点击选择</small>
                    </div>
                    <input type="file" id="file-input" accept="image/*" style="display:none">
                </div>

                <div id="preview-container" style="display:none" class="mt-3">
                    <img id="preview-img" class="img-fluid rounded" style="max-height:300px;width:100%;object-fit:contain;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;">
                    <div class="mt-2 d-flex gap-2">
                        <button id="btn-ocr" class="btn btn-primary flex-fill">开始识别</button>
                        <button id="btn-clear" class="btn btn-outline-danger">清除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">识别结果</h5>
                <div id="ocr-status" class="mb-3"></div>
                <div id="ocr-results" class="mb-3"></div>
                <div id="save-status" class="mb-3"></div>
                <button id="btn-save" class="btn btn-primary" style="display:none">确认保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    const btnOcr = document.getElementById('btn-ocr');
    const btnClear = document.getElementById('btn-clear');
    const btnSave = document.getElementById('btn-save');
    const ocrStatus = document.getElementById('ocr-status');
    const ocrResults = document.getElementById('ocr-results');
    const saveStatus = document.getElementById('save-status');

    let currentImage = null;
    let currentItems = [];

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });

    document.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                handleFile(item.getAsFile());
                break;
            }
        }
    });

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImage = e.target.result;
            previewImg.src = currentImage;
            previewContainer.style.display = 'block';
            dropZone.style.display = 'none';
            ocrResults.innerHTML = '';
            ocrStatus.innerHTML = '';
            saveStatus.innerHTML = '';
            btnSave.style.display = 'none';
            currentItems = [];
        };
        reader.readAsDataURL(file);
    }

    btnClear.addEventListener('click', () => {
        currentImage = null;
        previewContainer.style.display = 'none';
        dropZone.style.display = 'block';
        ocrResults.innerHTML = '';
        ocrStatus.innerHTML = '';
        saveStatus.innerHTML = '';
        btnSave.style.display = 'none';
        currentItems = [];
        fileInput.value = '';
    });

    btnOcr.addEventListener('click', async () => {
        if (!currentImage) return;
        ocrStatus.innerHTML = '<div class="alert alert-info">识别中...</div>';
        btnSave.style.display = 'none';
        ocrResults.innerHTML = '';

        try {
            const resp = await fetch('/api/ocr', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({image: currentImage})
            });
            const data = await resp.json();
            if (data.error) {
                ocrStatus.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                return;
            }
            currentItems = data.items || [];
            if (currentItems.length === 0) {
                ocrStatus.innerHTML = '<div class="alert alert-warning">未识别到胶卷商品</div>';
                if (data.raw_lines && data.raw_lines.length > 0) {
                    ocrResults.innerHTML = '<div class="section-title mt-3">OCR 原始文本</div><pre style="font-size:0.75rem;color:var(--text-dim);max-height:200px;overflow:auto;background:var(--bg-input);padding:0.75rem;border-radius:8px;">' + data.raw_lines.join('\n') + '</pre>';
                }
                return;
            }

            ocrStatus.innerHTML = `<div class="alert alert-success">识别到 ${currentItems.length} 条商品</div>`;
            renderItems(currentItems);
            btnSave.style.display = 'block';
        } catch(e) {
            ocrStatus.innerHTML = `<div class="alert alert-danger">请求失败: ${e.message}</div>`;
        }
    });

    let allFilms = [];

    async function loadFilms() {
        try {
            const resp = await fetch('/api/films/list');
            if (resp.ok) allFilms = await resp.json();
        } catch(e) {}
    }
    loadFilms();

    const MODEL_KEYWORDS = {
        'colorplus': ['colorplus', '易拍', 'color plus'],
        'gold': ['gold', '金200', '金 200'],
        'ultramax': ['ultramax', '全能', 'ultra max'],
        'portra': ['portra', '波特拉'],
        'ektar': ['ektar', '依克塔'],
        'provia': ['provia', '普罗维亚'],
        'velvia': ['velvia', '维尔维亚'],
        'cinestill': ['cinestill', '电影卷'],
        'superia': ['superia', '世霸'],
        'c200': ['c200', 'c 200'],
        'c400': ['c400', 'c 400'],
        'hp5': ['hp5', 'hp 5'],
        'delta': ['delta'],
        'fomapan': ['fomapan'],
        'pan400': ['pan400', 'pan 400'],
        'ek100': ['ek100', 'ek 100'],
    };

    function matchFilm(item) {
        let best = null, bestScore = 0;
        const title = (item.title || '').toLowerCase();
        for (const f of allFilms) {
            let score = 0;
            const brand = (f.brand || '').toLowerCase();
            const model = (f.model || '').toLowerCase();
            if (brand && title.includes(brand)) score += 10;
            if (f.iso && title.includes(String(f.iso))) score += 5;
            if (f.format) {
                const fmt = f.format.toLowerCase();
                if (fmt.includes('35mm') && (title.includes('135') || title.includes('35mm'))) score += 5;
                else if (fmt.includes('120') && title.includes('120')) score += 5;
                else if (title.includes(fmt)) score += 5;
            }
            if (f.film_type) {
                const ft = f.film_type.toLowerCase();
                if (ft.includes('彩负') && (title.includes('彩负') || title.includes('color'))) score += 3;
                else if (ft.includes('黑白') && (title.includes('黑白') || title.includes('b&w'))) score += 3;
                else if (ft.includes('反转') && (title.includes('反转') || title.includes('slide'))) score += 3;
                else if (ft.includes('电影卷') && (title.includes('电影卷') || title.includes('vision'))) score += 3;
                else if (ft.includes('一次成像') && (title.includes('instax') || title.includes('polaroid'))) score += 3;
            }
            if (model) {
                for (const [key, aliases] of Object.entries(MODEL_KEYWORDS)) {
                    if (model.includes(key)) {
                        for (const alias of aliases) {
                            if (title.includes(alias)) { score += 20; break; }
                        }
                        break;
                    }
                }
            }
            if (score > bestScore) { bestScore = score; best = f; }
        }
        return bestScore >= 5 ? best : null;
    }

    function renderItems(items) {
        let html = '';
        const hasOrder = items.length > 0 && items[0].order_date;
        if (hasOrder) {
            const first = items[0];
            const orderDate = (first.order_date || '').replace(/-/g, '.');
            html += `<div class="ocr-order-info">
                <span class="ocr-order-tag">订单</span>
                <span>${escHtml(orderDate)}</span>
                <span class="ocr-order-sep"></span>
                <span>${escHtml(first.order_no)}</span>
                <span class="ocr-order-sep"></span>
                <span>${escHtml(first.store)}</span>
            </div>`;
        }

        items.forEach((item, i) => {
            const matched = matchFilm(item);
            item.film_id = matched ? matched.id : null;
            if (!item.rolls_per_pack) item.rolls_per_pack = 1;
            const perRoll = item.rolls_per_pack > 1 ? (item.price / item.rolls_per_pack).toFixed(2) : null;

            let filmBadge;
            if (matched) {
                filmBadge = `<span class="film-badge">${escHtml(matched.brand)} ${escHtml(matched.model)}</span>`;
            } else {
                let opts = '<option value="">选择胶片</option>';
                allFilms.forEach(f => {
                    opts += `<option value="${f.id}">${escHtml(f.brand)} ${escHtml(f.model)}</option>`;
                });
                filmBadge = `<select class="film-select" onchange="currentItems[${i}].film_id=this.value||null; this.className=this.value?'film-select film-ok':'film-select film-err';">${opts}</select>`;
            }

            const packHtml = item.rolls_per_pack > 1
                ? `<span class="ph-tag">${item.rolls_per_pack}卷装 单卷¥${perRoll}</span>`
                : `<button class="ph-add-pack" onclick="currentItems[${i}].rolls_per_pack=2;renderItems(currentItems);">+设置每盒卷数</button>`;

            html += `<div class="ocr-card">
                <div class="ocr-card-header">
                    <input type="text" class="ocr-title-input" value="${escAttr(item.title)}" onchange="currentItems[${i}].title=this.value;">
                    <div class="ocr-card-actions">${filmBadge}<button class="ocr-del-btn" onclick="removeItem(${i})">&#10005;</button></div>
                </div>
                <div class="ocr-card-body">
                    <span class="ocr-store">${escHtml(item.store)}</span>
                    <div class="ocr-price-row">
                        <span class="ocr-label">单价</span>
                        <input type="number" step="0.01" class="ocr-num-input" value="${item.unit_price}" onchange="currentItems[${i}].unit_price=parseFloat(this.value)||0;currentItems[${i}].price=currentItems[${i}].unit_price*currentItems[${i}].quantity;renderItems(currentItems);">
                        <span class="ocr-multiply">&times;</span>
                        <input type="number" min="1" class="ocr-num-input" style="width:44px;" value="${item.quantity}" onchange="currentItems[${i}].quantity=parseInt(this.value)||1;currentItems[${i}].price=currentItems[${i}].unit_price*currentItems[${i}].quantity;renderItems(currentItems);">
                        <span class="ocr-equal">=</span>
                        <span class="ocr-total">¥${item.price}</span>
                        <span class="ocr-sep"></span>
                        ${packHtml}
                    </div>
                </div>
            </div>`;
        });
        ocrResults.innerHTML = html;
    }

    window.removeItem = function(idx) {
        currentItems.splice(idx, 1);
        if (currentItems.length === 0) {
            ocrResults.innerHTML = '';
            btnSave.style.display = 'none';
            ocrStatus.innerHTML = '<div class="alert alert-warning">没有要保存的商品</div>';
        } else {
            renderItems(currentItems);
        }
    };

    btnSave.addEventListener('click', async () => {
        if (currentItems.length === 0) return;
        saveStatus.innerHTML = '<div class="alert alert-info">保存中...</div>';

        try {
            const resp = await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({items: currentItems})
            });
            const data = await resp.json();
            if (data.error) {
                saveStatus.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                return;
            }
            let msg = `成功保存 ${data.saved} 条价格记录`;
            if (data.skipped > 0) msg += `，${data.skipped} 条未匹配到胶片`;
            saveStatus.innerHTML = `<div class="alert alert-success">${msg}</div>`;
            btnSave.style.display = 'none';
        } catch(e) {
            saveStatus.innerHTML = `<div class="alert alert-danger">保存失败: ${e.message}</div>`;
        }
    });

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
    }
    function escAttr(s) {
        return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
})();
</script>

<style>
.drop-zone {
    border: 2px dashed var(--border-input);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--bg-input);
}
.drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--primary-soft);
}
.drop-zone-content p {
    color: var(--text-secondary);
    margin: 0.75rem 0 0.25rem;
    font-weight: 500;
}
.drop-zone-content small {
    color: var(--text-faint);
}
.ocr-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg-elevated);
    margin-bottom: 0.625rem;
    overflow: hidden;
    transition: border-color 0.2s;
}
.ocr-card:hover {
    border-color: var(--border-hover);
}
.ocr-card-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 0.85rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg-input);
}
.ocr-title-input {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    outline: none;
    padding: 0.2rem 0;
}
.ocr-card-actions {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
}
.film-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success-border);
    white-space: nowrap;
}
.film-select {
    font-size: 0.72rem;
    padding: 0.2rem 0.4rem;
    border-radius: 6px;
    border: 1px solid var(--border-input);
    background: var(--bg-input);
    color: var(--text);
    outline: none;
    max-width: 130px;
}
.film-select.film-ok {
    border-color: var(--success-border);
    color: var(--success);
}
.film-select.film-err {
    border-color: var(--danger-border);
    color: var(--danger);
}
.ocr-del-btn {
    width: 24px;
    height: 24px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
}
.ocr-del-btn:hover {
    background: var(--danger-bg);
    color: var(--danger);
}
.ocr-card-body {
    padding: 0.6rem 0.85rem 0.7rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
}
.ocr-store {
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
}
.ocr-price-row {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    flex-wrap: wrap;
    font-size: 0.82rem;
}
.ocr-label {
    font-size: 0.75rem;
    color: var(--text-muted);
}
.ocr-num-input {
    width: 60px;
    height: 28px;
    border: 1px solid var(--border-input);
    border-radius: 6px;
    background: var(--bg-input);
    color: var(--text);
    font-size: 0.8rem;
    text-align: center;
    outline: none;
    padding: 0;
    transition: border-color 0.2s;
}
.ocr-num-input:focus {
    border-color: var(--accent);
}
.ocr-multiply, .ocr-equal {
    color: var(--text-muted);
    font-size: 0.8rem;
}
.ocr-total {
    font-weight: 600;
    color: var(--danger);
    font-size: 0.88rem;
}
.ocr-sep {
    width: 1px;
    height: 14px;
    background: var(--border);
    margin: 0 0.15rem;
}
.ph-tag {
    font-size: 0.72rem;
    color: var(--accent);
    background: var(--primary-soft);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    white-space: nowrap;
}
.ph-add-pack {
    font-size: 0.72rem;
    color: var(--text-muted);
    background: none;
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 0.12rem 0.45rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}
.ph-add-pack:hover {
    border-color: var(--accent);
    color: var(--accent);
}
.ocr-order-info {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.55rem 0.85rem;
    border-radius: 10px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 0.625rem;
    flex-wrap: wrap;
}
.ocr-order-tag {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    background: var(--primary-soft);
    color: var(--accent);
}
.ocr-order-sep {
    width: 1px;
    height: 12px;
    background: var(--border);
}
</style>
{% endblock %}
