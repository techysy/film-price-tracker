{% extends "base.html" %}

{% block title %}截图识别 - 胶卷价格追踪{% endblock %}

{% block content %}
<h1 class="mb-4">截图识别</h1>

<div class="row g-4">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">上传截图</h5>
                <p class="card-text mb-3">支持粘贴 (Ctrl+V)、拖拽或点击选择购物车截图</p>

                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p>在此粘贴或拖入截图</p>
                        <small class="text-muted">Ctrl+V 粘贴 / 拖拽文件 / 点击选择</small>
                    </div>
                    <input type="file" id="file-input" accept="image/*" style="display:none">
                </div>

                <div id="preview-container" style="display:none" class="mt-3">
                    <img id="preview-img" class="img-fluid rounded" style="max-height:300px;width:100%;object-fit:contain;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;">
                    <div class="mt-2 d-flex gap-2">
                        <button id="btn-ocr" class="btn btn-primary flex-fill">开始识别</button>
                        <button id="btn-clear" class="btn btn-outline-danger">清除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">识别结果</h5>
                <div id="ocr-status" class="mb-3"></div>
                <div id="ocr-results" class="mb-3"></div>
                <div id="save-status" class="mb-3"></div>
                <button id="btn-save" class="btn btn-primary" style="display:none">确认保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    const btnOcr = document.getElementById('btn-ocr');
    const btnClear = document.getElementById('btn-clear');
    const btnSave = document.getElementById('btn-save');
    const ocrStatus = document.getElementById('ocr-status');
    const ocrResults = document.getElementById('ocr-results');
    const saveStatus = document.getElementById('save-status');

    let currentImage = null;
    let currentItems = [];

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });

    document.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                handleFile(item.getAsFile());
                break;
            }
        }
    });

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImage = e.target.result;
            previewImg.src = currentImage;
            previewContainer.style.display = 'block';
            dropZone.style.display = 'none';
            ocrResults.innerHTML = '';
            ocrStatus.innerHTML = '';
            saveStatus.innerHTML = '';
            btnSave.style.display = 'none';
            currentItems = [];
        };
        reader.readAsDataURL(file);
    }

    btnClear.addEventListener('click', () => {
        currentImage = null;
        previewContainer.style.display = 'none';
        dropZone.style.display = 'block';
        ocrResults.innerHTML = '';
        ocrStatus.innerHTML = '';
        saveStatus.innerHTML = '';
        btnSave.style.display = 'none';
        currentItems = [];
        fileInput.value = '';
    });

    btnOcr.addEventListener('click', async () => {
        if (!currentImage) return;
        ocrStatus.innerHTML = '<div class="alert alert-info">识别中...</div>';
        btnSave.style.display = 'none';
        ocrResults.innerHTML = '';

        try {
            const resp = await fetch('/api/ocr', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({image: currentImage})
            });
            const data = await resp.json();
            if (data.error) {
                ocrStatus.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                return;
            }
            currentItems = data.items || [];
            if (currentItems.length === 0) {
                ocrStatus.innerHTML = '<div class="alert alert-warning">未识别到胶卷商品</div>';
                if (data.raw_lines && data.raw_lines.length > 0) {
                    ocrResults.innerHTML = '<div class="section-title mt-3">OCR 原始文本</div><pre style="font-size:0.75rem;color:var(--text-dim);max-height:200px;overflow:auto;background:var(--bg-input);padding:0.75rem;border-radius:8px;">' + data.raw_lines.join('\n') + '</pre>';
                }
                return;
            }

            ocrStatus.innerHTML = `<div class="alert alert-success">识别到 ${currentItems.length} 条商品</div>`;
            renderItems(currentItems);
            btnSave.style.display = 'block';
        } catch(e) {
            ocrStatus.innerHTML = `<div class="alert alert-danger">请求失败: ${e.message}</div>`;
        }
    });

    function renderItems(items) {
        let html = '<div class="table-responsive"><table class="table table-hover"><thead><tr><th>店铺</th><th>商品</th><th>解析</th><th>价格</th><th></th></tr></thead><tbody>';
        items.forEach((item, i) => {
            let tags = [];
            if (item.brand && item.brand !== '其他') tags.push(`<span class="badge" style="background:var(--primary-soft);color:var(--accent);border:1px solid var(--primary-border);">${escHtml(item.brand)}</span>`);
            if (item.format) tags.push(`<span class="badge" style="background:var(--success-bg);color:var(--success);border:1px solid var(--success-border);">${escHtml(item.format)}</span>`);
            if (item.film_type) tags.push(`<span class="badge" style="background:rgba(251,191,36,0.15);color:#f59e0b;border:1px solid rgba(251,191,36,0.3);">${escHtml(item.film_type)}</span>`);
            if (item.iso) tags.push(`<span class="badge" style="background:var(--bg-input);color:var(--text-secondary);border:1px solid var(--border);">ISO ${item.iso}</span>`);
            if (item.expiry) tags.push(`<span class="badge" style="background:var(--bg-input);color:var(--text-muted);border:1px solid var(--border);">${escHtml(item.expiry)}</span>`);
            let tagStr = tags.length ? '<div class="d-flex flex-wrap gap-1" style="font-size:0.72rem;">' + tags.join('') + '</div>' : '<span class="text-muted" style="font-size:0.8rem;">-</span>';
            html += `<tr>
                <td style="white-space:nowrap">${escHtml(item.store)}</td>
                <td style="max-width:260px;">${escHtml(item.title)}</td>
                <td>${tagStr}</td>
                <td class="text-danger fw-bold">¥${item.price}</td>
                <td><button class="btn btn-sm btn-outline-danger" onclick="removeItem(${i})">删除</button></td>
            </tr>`;
        });
        html += '</tbody></table></div>';
        ocrResults.innerHTML = html;
    }

    window.removeItem = function(idx) {
        currentItems.splice(idx, 1);
        if (currentItems.length === 0) {
            ocrResults.innerHTML = '';
            btnSave.style.display = 'none';
            ocrStatus.innerHTML = '<div class="alert alert-warning">没有要保存的商品</div>';
        } else {
            renderItems(currentItems);
        }
    };

    btnSave.addEventListener('click', async () => {
        if (currentItems.length === 0) return;
        saveStatus.innerHTML = '<div class="alert alert-info">保存中...</div>';

        try {
            const resp = await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({items: currentItems})
            });
            const data = await resp.json();
            if (data.error) {
                saveStatus.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                return;
            }
            saveStatus.innerHTML = `<div class="alert alert-success">成功保存 ${data.saved} 条价格记录</div>`;
            btnSave.style.display = 'none';
        } catch(e) {
            saveStatus.innerHTML = `<div class="alert alert-danger">保存失败: ${e.message}</div>`;
        }
    });

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
})();
</script>

<style>
.drop-zone {
    border: 2px dashed var(--border-input);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--bg-input);
}
.drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--primary-soft);
}
.drop-zone-content p {
    color: var(--text-secondary);
    margin: 0.75rem 0 0.25rem;
    font-weight: 500;
}
.drop-zone-content small {
    color: var(--text-faint);
}
</style>
{% endblock %}
